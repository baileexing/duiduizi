<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天对地 · 对对子</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8ed;--bg2:#f5edd8;--card:#fff;
  --ink:#2c1a06;--ink2:#6b4a22;--ink3:#a07848;
  --red:#c8321a;--red-lt:#fdecea;
  --gold:#c8860a;--gold-lt:#fff8e8;
  --green:#2a7a48;--grn-lt:#eaf7f0;
  --blue:#1a5fa0;--blue-lt:#eaf1fc;
  --purple:#6b3fa0;--pur-lt:#f3eeff;
  --border:rgba(44,26,6,.10);--shadow:0 2px 16px rgba(44,26,6,.08);
}
body{font-family:"STKaiti","Kaiti SC","KaiTi","PingFang SC","Microsoft YaHei",serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:18px 14px 72px}
#app{width:100%;max-width:480px}
.screen{display:none}
.screen.active{display:block;animation:up .28s cubic-bezier(.22,1,.36,1)}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 20px;box-shadow:var(--shadow);position:relative}

/* ── BRAND ── */
.brand-hero{text-align:center;padding:24px 0 20px}
.brand-big{font-size:54px;font-weight:900;color:var(--red);letter-spacing:12px;line-height:1;text-shadow:2px 2px 0 rgba(200,50,26,.12)}
.brand-en{font-size:10px;letter-spacing:6px;color:var(--ink3);margin-top:5px;font-family:"PingFang SC",sans-serif;font-weight:400}
.brand-sample{font-size:17px;color:var(--ink2);margin-top:12px;letter-spacing:4px;line-height:2.1}
.brand-sample span{color:var(--red);font-weight:700}

/* ── LEVELS ── */
.levels-title{font-size:11px;letter-spacing:3px;color:var(--ink3);margin-bottom:14px;font-family:"PingFang SC",sans-serif;font-weight:400}
.level-grid{display:flex;flex-direction:column;gap:10px}
.lv-card{display:flex;align-items:center;gap:14px;padding:16px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;transition:border-color .18s,background .18s,transform .12s;-webkit-tap-highlight-color:transparent;user-select:none}
.lv-card:active{transform:scale(.975)}
.lv-card.unlocked:hover{border-color:rgba(200,50,26,.35);background:rgba(200,50,26,.03)}
.lv-card.locked{opacity:.48;cursor:default}
.lv-icon{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.lv-body{flex:1;min-width:0}
.lv-name{font-size:15px;font-weight:700;color:var(--ink)}
.lv-sub{font-size:11px;color:var(--ink3);margin-top:2px;font-family:"PingFang SC",sans-serif;font-weight:400}
.lv-right{flex-shrink:0;text-align:right}
.lv-stars{font-size:14px;letter-spacing:1px}
.lv-pct{font-size:11px;color:var(--ink3);margin-top:2px;font-family:"PingFang SC",sans-serif}
.lock-icon{font-size:18px;color:var(--ink3)}

/* ── PROGRESS BAR ── */
.prog-wrap{margin-bottom:18px}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--ink3)}
.prog{height:6px;background:rgba(44,26,6,.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--red) 0%,var(--gold) 100%);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* ── TOP BAR ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;min-height:34px}
.logo-sm{font-size:13px;font-weight:700;color:var(--red);letter-spacing:2px;cursor:pointer}
.hd-right{display:flex;align-items:center;gap:10px}
.streak{display:flex;align-items:center;gap:4px;background:var(--gold-lt);border:1px solid rgba(200,134,10,.25);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--gold);transition:all .2s}
.streak.pulse{animation:pulse .35s ease}
@keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}
.lv-badge{font-size:11px;color:var(--ink3);font-family:"PingFang SC",sans-serif;padding:3px 9px;border-radius:10px;border:1px solid var(--border)}

/* ── COUPLET ── */
.src-tag{font-size:10px;letter-spacing:2px;color:var(--ink3);font-family:"PingFang SC",sans-serif;font-weight:400;margin-bottom:12px}
.q-label{font-size:11px;letter-spacing:2px;color:var(--ink3);font-family:"PingFang SC",sans-serif;font-weight:400;margin-bottom:12px}
.couplet-box{text-align:center;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:18px}
.couplet-line{font-size:30px;font-weight:700;color:var(--ink);letter-spacing:6px;line-height:1.4}
.blank{display:inline-block;min-width:32px;padding:0 3px;height:36px;line-height:36px;border-bottom:3px solid var(--red);color:var(--red);font-size:26px;vertical-align:middle;text-align:center;letter-spacing:4px;box-sizing:content-box}
.couplet-line2{font-size:18px;color:var(--ink3);letter-spacing:4px;margin-top:8px}

/* ── OPTIONS ── */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{padding:14px 6px;border:2px solid var(--border);border-radius:13px;background:var(--card);font-size:22px;font-weight:700;color:var(--ink);text-align:center;cursor:pointer;letter-spacing:3px;transition:border-color .15s,background .15s,transform .12s;-webkit-tap-highlight-color:transparent;user-select:none}
.opt:hover:not(:disabled){border-color:rgba(200,50,26,.35);background:rgba(200,50,26,.04)}
.opt:active:not(:disabled){transform:scale(.955)}
.opt.correct{border-color:var(--green);background:var(--grn-lt);color:var(--green);animation:correctPop .35s cubic-bezier(.22,1,.36,1)}
.opt.wrong{border-color:var(--red);background:var(--red-lt);color:var(--red);animation:wrongShake .38s ease}
.opt.reveal{border-color:var(--green);background:var(--grn-lt);color:var(--green)}
.opt:disabled{cursor:default}
@keyframes correctPop{0%{transform:scale(1)}35%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── FEEDBACK ── */
.feedback{margin-top:16px;border-radius:13px;padding:15px;display:none;border:1px solid transparent}
.feedback.show{display:block;animation:up .25s ease}
.feedback.ok{background:var(--grn-lt);border-color:rgba(42,122,72,.2)}
.feedback.err{background:var(--red-lt);border-color:rgba(200,50,26,.18)}
.fb-head{font-size:15px;font-weight:700;margin-bottom:8px;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
.fb-head.ok{color:var(--green)}
.fb-head.err{color:var(--red)}
.full-couplet{font-size:17px;font-weight:700;letter-spacing:3px;color:var(--ink);margin-bottom:10px;padding:10px 14px;background:rgba(44,26,6,.04);border-radius:8px;line-height:1.85}
.full-couplet .hl{color:var(--red)}
.fb-exp{font-size:13px;color:var(--ink2);line-height:1.9;font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-weight:400}

.hint-row{margin-bottom:10px;padding:8px 14px;background:rgba(200,134,10,.08);border-radius:10px;border-left:3px solid var(--gold);text-align:left}
.hint-tag{font-size:10px;letter-spacing:2px;color:var(--gold);font-family:"PingFang SC",sans-serif;font-weight:700;display:block;margin-bottom:4px}
.hint-txt{font-size:22px;font-weight:700;color:var(--ink2);letter-spacing:5px}
/* ── SPEAK ── */
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;margin-bottom:12px;border-radius:20px;border:1.5px solid rgba(42,122,72,.35);background:rgba(42,122,72,.08);color:var(--green);font-size:13px;font-weight:700;cursor:pointer;font-family:"PingFang SC","Microsoft YaHei",sans-serif;transition:background .15s;-webkit-tap-highlight-color:transparent;line-height:1}
.speak-btn.err-s{background:rgba(200,50,26,.07);border-color:rgba(200,50,26,.3);color:var(--red)}
.speak-btn:hover{background:rgba(42,122,72,.16)}
.speak-icon{font-size:16px}
.speak-btn.speaking .speak-icon{animation:speakPulse .55s ease infinite alternate}
@keyframes speakPulse{from{transform:scale(1)}to{transform:scale(1.28)}}

/* ── NEXT BTN ── */
.next-btn{display:block;width:100%;margin-top:14px;padding:14px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:"PingFang SC","Microsoft YaHei",sans-serif;transition:opacity .15s,transform .12s;-webkit-tap-highlight-color:transparent;letter-spacing:2px}
.next-btn:hover{opacity:.9}
.next-btn:active{transform:scale(.97)}

/* ── LEVEL END ── */
#lvend-screen{text-align:center}
.lvend-icon{font-size:56px;margin-bottom:10px}
.lvend-stars{font-size:36px;letter-spacing:6px;margin:10px 0 6px}
.lvend-score{font-size:56px;font-weight:900;color:var(--red);line-height:1}
.lvend-label{font-size:12px;color:var(--ink3);font-family:"PingFang SC",sans-serif;margin:4px 0 4px}
.lvend-title{font-size:24px;font-weight:900;margin:10px 0 4px}
.lvend-desc{font-size:14px;color:var(--ink2);margin-bottom:20px;line-height:1.7;font-family:"PingFang SC",sans-serif}
.unlock-box{background:var(--gold-lt);border:1px solid rgba(200,134,10,.3);border-radius:13px;padding:14px 16px;margin-bottom:18px;text-align:left}
.unlock-box h3{font-size:13px;color:var(--gold);font-family:"PingFang SC",sans-serif;font-weight:700;margin-bottom:6px}
.unlock-box p{font-size:13px;color:var(--ink2);font-family:"PingFang SC",sans-serif;line-height:1.7}
.hist-wrap{text-align:left;margin-bottom:18px}
.hist-head{font-size:11px;letter-spacing:2px;color:var(--ink3);margin-bottom:8px;font-family:"PingFang SC",sans-serif}
.hist-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.hist-row:last-child{border-bottom:none}
.hist-q{flex:1;color:var(--ink2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:12px}
.hist-a{font-weight:700;flex-shrink:0;font-size:13px}
.fin-btns{display:flex;flex-direction:column;gap:10px}
.btn-red{padding:15px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:3px;font-family:"PingFang SC",sans-serif;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.btn-red:hover{opacity:.9}
.btn-outline{padding:14px;background:transparent;color:var(--red);border:1.5px solid rgba(200,50,26,.35);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:2px;font-family:"PingFang SC",sans-serif;transition:background .15s;-webkit-tap-highlight-color:transparent}
.btn-outline:hover{background:rgba(200,50,26,.04)}

@media(max-width:400px){.brand-big{font-size:44px;letter-spacing:8px}.couplet-line{font-size:24px;letter-spacing:4px}.opt{font-size:18px;padding:12px 4px}}
</style>
</head>
<body>
<div id="app">

<!-- ══ 关卡地图 ══ -->
<div id="map-screen" class="screen active">
  <div class="brand-hero">
    <div class="brand-big">对对子</div>
    <div class="brand-en">DUÌDUÌZǏ · 笠翁对韵全文</div>
    <div class="brand-sample">天对<span>地</span>，雨对<span>风</span><br>大陆对<span>长空</span></div>
  </div>
  <div class="card">
    <div class="levels-title">选择关卡 · 逐级解锁</div>
    <div class="level-grid" id="level-grid"></div>
  </div>
</div>

<!-- ══ 游戏 ══ -->
<div id="game-screen" class="screen">
  <div class="top-bar">
    <span class="logo-sm" id="back-btn">← 返回</span>
    <div class="hd-right">
      <div class="streak" id="streak-badge"><span class="speak-icon">🔥</span><span id="streak-n">0</span><span style="font-size:11px;font-family:'PingFang SC',sans-serif">连击</span></div>
      <span style="font-size:13px;color:var(--ink3)" id="score-badge">0分</span>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-meta"><span id="prog-txt">第 1 题</span><span id="prog-pct">0 / 20</span></div>
    <div class="prog"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="card">
    <div class="src-tag" id="src-tag"></div>
    <div class="q-label">选出正确的对子</div>
    <div class="couplet-box">
      <div class="hint-row" id="hint-row" style="display:none">
        <span class="hint-tag" id="hint-tag">上联</span>
        <span class="hint-txt" id="hint-txt"></span>
      </div>
      <div class="couplet-line" id="q-line1"></div>
      <div class="couplet-line2" id="q-line2"></div>
    </div>
    <div class="opts" id="opts-grid">
      <button class="opt" id="opt0"></button>
      <button class="opt" id="opt1"></button>
      <button class="opt" id="opt2"></button>
      <button class="opt" id="opt3"></button>
    </div>
    <div class="feedback" id="feedback">
      <div class="fb-head" id="fb-head"></div>
      <button class="speak-btn" id="speak-btn" onclick="replaySpeak()"><span class="speak-icon">🔊</span> 朗读对子</button>
      <div class="full-couplet" id="full-couplet"></div>
      <div class="fb-exp" id="fb-exp"></div>
      <button class="next-btn" id="next-btn">继续下一题 →</button>
    </div>
  </div>
</div>

<!-- ══ 关卡结束 ══ -->
<div id="lvend-screen" class="screen">
  <div class="card">
    <div class="lvend-icon" id="le-icon">🏆</div>
    <div class="lvend-stars" id="le-stars">⭐⭐⭐</div>
    <div class="lvend-score" id="le-score">0</div>
    <div class="lvend-label">分（满分 <span id="le-max">100</span>）</div>
    <div class="lvend-title" id="le-title">进士</div>
    <div class="lvend-desc"  id="le-desc">再接再厉！</div>
    <div class="unlock-box" id="le-unlock" style="display:none">
      <h3>🔓 解锁新关卡</h3>
      <p id="le-unlock-txt"></p>
    </div>
    <div class="hist-wrap">
      <div class="hist-head">本关回顾</div>
      <div id="le-hist"></div>
    </div>
    <div class="fin-btns">
      <button class="btn-red"     id="le-next-btn">挑战下一关 →</button>
      <button class="btn-outline" id="le-retry-btn">再练一遍 ↩</button>
      <button class="btn-outline" id="le-map-btn">返回关卡地图</button>
    </div>
  </div>
</div>

</div><!-- #app -->
<script>
/* ============================================================
   题库 — 5关 × 20题 = 100题
   格式: before,blank,after,line2,opts[4],full,exp,src
============================================================ */
var DB = [

/* ── 第1关：天地初开（卷一·天韵、冬韵）20题 ── */
{before:"天对",blank:"地",after:"，雨对风",line2:"",
 opts:["地","山","水","空"],
 full:"天对地，雨对风。\n大陆对长空。",
 exp:"天在上，地在下，这是最基本的对仗。《笠翁对韵》开篇第一对，也是学对联的起点。",
 src:"《笠翁对韵》卷一·天韵"},

{before:"大陆对",blank:"长空",after:"",line2:"山花对海树",
 opts:["长空","深海","青山","白云"],
 full:"大陆对长空。\n山花对海树，赤日对苍穹。",
 exp:"大陆（广阔的土地）对长空（辽阔的天空），一地一天，空间壮阔。",
 src:"《笠翁对韵》卷一·天韵"},

{before:"山花对",blank:"海树",after:"",line2:"赤日对苍穹",
 opts:["海树","江月","湖草","云松"],
 full:"山花对海树，\n赤日对苍穹。",
 exp:"山中之花对海边之树，山与海（地理）、花与树（植物）双重对仗，意象开阔壮美。",
 src:"《笠翁对韵》卷一·天韵"},

{before:"赤日对",blank:"苍穹",after:"",line2:"雷隐隐，雾蒙蒙",
 opts:["苍穹","碧海","青山","玄天"],
 full:"赤日对苍穹。\n雷隐隐，雾蒙蒙，日下对天中。",
 exp:"赤日（红彤彤的太阳）对苍穹（青苍的天空），颜色（赤/苍）与意象（日/穹）双重对仗。苍穹就是天空，「穹」字形如拱顶。",
 src:"《笠翁对韵》卷一·天韵"},

{before:"雷隐隐，",blank:"雾蒙蒙",after:"",line2:"日下对天中",
 opts:["雾蒙蒙","云茫茫","雪纷纷","风萧萧"],
 full:"雷隐隐，雾蒙蒙，\n日下对天中。",
 exp:"雷隐隐（雷声隐约）对雾蒙蒙（雾气弥漫），叠字对叠字，读来朗朗上口，是《笠翁对韵》最好玩的句式。",
 src:"《笠翁对韵》卷一·天韵"},

{before:"风高秋月",blank:"白",after:"，雨霁晚霞红",line2:"",
 opts:["白","明","清","圆"],
 full:"风高秋月白，\n雨霁晚霞红。",
 exp:"秋风劲吹，月色清白；雨后初晴，晚霞映红。白与红（颜色对），秋月与晚霞（意象对）——《笠翁对韵》天韵最美的写景句！",
 src:"《笠翁对韵》卷一·天韵"},

{before:"雨霁晚霞",blank:"红",after:"",line2:"",
 opts:["红","艳","明","彩"],
 full:"风高秋月白，\n雨霁晚霞红。",
 exp:"雨霁（雨后天晴），晚霞格外鲜红。白（冷色）对红（暖色），冷暖相衬，色彩极为生动。",
 src:"《笠翁对韵》卷一·天韵"},

{before:"来鸿对",blank:"去燕",after:"",line2:"宿鸟对鸣虫",
 opts:["去燕","归雁","远鹰","落雁"],
 full:"来鸿对去燕，\n宿鸟对鸣虫。",
 exp:"鸿雁北来，燕子南去，一来一去方向相对，都是迁徙的候鸟，自然界的对仗之美。",
 src:"《笠翁对韵》卷一·冬韵"},

{before:"宿鸟对",blank:"鸣虫",after:"",line2:"",
 opts:["鸣虫","飞燕","游鱼","啼猿"],
 full:"来鸿对去燕，\n宿鸟对鸣虫。",
 exp:"宿鸟（归巢栖息的鸟）对鸣虫（夜里鸣叫的虫），静对动，归宿对鸣唱，是秋夜最生动的意象。",
 src:"《笠翁对韵》卷一·冬韵"},

{before:"三尺剑，",blank:"六钧弓",after:"",line2:"岭北对江东",
 opts:["六钧弓","万斤锤","百步箭","千斤棒"],
 full:"三尺剑，六钧弓，\n岭北对江东。",
 exp:"三尺（剑长约三尺）对六钧（弓力六钧，一钧约十五斤）。数字相对，兵器相对，豪气干云！",
 src:"《笠翁对韵》卷一·冬韵"},

{before:"岭北对",blank:"江东",after:"",line2:"",
 opts:["江东","海西","山南","河北"],
 full:"三尺剑，六钧弓，\n岭北对江东。",
 exp:"岭北（山岭以北）对江东（江水以东），以山水为界的地理方位对，是古人常用的空间描述方式。",
 src:"《笠翁对韵》卷一·冬韵"},

{before:"人间",blank:"清暑殿",after:"",line2:"天上广寒宫",
 opts:["清暑殿","避暑台","乘凉阁","消夏所"],
 full:"人间清暑殿，\n天上广寒宫。",
 exp:"人间的清暑殿（纳凉宫殿）对天上的广寒宫（月宫），人间对天上，建筑对建筑，暑对寒，温度也相对！",
 src:"《笠翁对韵》卷一·冬韵"},

{before:"天上",blank:"广寒宫",after:"",line2:"",
 opts:["广寒宫","明月宫","凌霄殿","紫微宫"],
 full:"人间清暑殿，\n天上广寒宫。",

{before:"一园春雨杏花",blank:"红",after:"",line2:"",

{before:"晨对",blank:"暮",after:"，下对上",line2:"树木对山川",

{before:"树木对",blank:"山川",after:"",line2:"",

{before:"牛女二星河",blank:"左右",after:"",line2:"参商两曜斗西东",

{before:"人迹板桥",blank:"霜",after:"",line2:"",

{before:"奇对偶，只对",blank:"双",after:"",line2:"汉祖对秦皇",

{before:"参商两曜斗",blank:"西东",after:"",line2:"",

{before:"功对过，善对",blank:"恶",after:"",line2:"",

{before:"举头望",blank:"明月",after:"",line2:"低头思故乡",

 full:"举头望明月，\n低头思故乡。",
 exp:"李白《静夜思》！仰头望明月，低头思故乡——举/低（动作相反），望/思（感官对），明月/故乡（意象：月是思乡象征）。中国人最熟悉的思乡名句！",

{before:"低头思",blank:"故乡",after:"",line2:"",

{before:"锄禾日当",blank:"午",after:"",line2:"汗滴禾下土",

{before:"汗滴禾下",blank:"土",after:"",line2:"",

{before:"野旷天低",blank:"树",after:"",line2:"江清月近人",

 src:"孟浩然《宿建德江》"},

{before:"江清月近",blank:"人",after:"",line2:"",

{before:"日照香炉生",blank:"紫烟",after:"",line2:"遥看瀑布挂前川",

{before:"遥看瀑布挂",blank:"前川",after:"",line2:"",

 src:"李白《望庐山瀑布》"},

{before:"春眠不觉",blank:"晓",after:"",line2:"处处闻啼鸟",

 src:"孟浩然《春晓》"},

{before:"处处闻",blank:"啼鸟",after:"",line2:"",

 full:"春眠不觉晓，\n处处闻啼鸟。",
 exp:"「处处」二字写出了鸟声无处不在，春天充满生机。「啼鸟」是古诗中春天的标志性意象——鸟鸣就是春天的音乐，唤醒沉睡的大地。",
 src:"孟浩然《春晓》"},

{before:"碧玉妆成一树",blank:"高",after:"",line2:"万条垂下绿丝绦",

/* ── 第3关：诗情画意（卷一·鱼虞齐佳灰真韵）20题 ── */
{before:"绿水对",blank:"青山",after:"",line2:"",

{before:"春风又绿",blank:"江南岸",after:"",line2:"明月何时照我还",

 src:"王安石《泊船瓜洲》"},

{before:"明月何时照我",blank:"还",after:"",line2:"",

{before:"欲穷千里目，更上",blank:"一层楼",after:"",line2:"",

{before:"会当凌绝顶，一览众山",blank:"小",after:"",line2:"",

 full:"会当凌绝顶，\n一览众山小。",

 src:"杜甫《望岳》"},

{before:"海内存知己，天涯若",blank:"比邻",after:"",line2:"",

 src:"王勃《送杜少府之任蜀州》"},

{before:"无边落木萧萧",blank:"下",after:"",line2:"不尽长江滚滚来",

 exp:"杜甫《登高》！落叶无边际地飘落，长江无尽头地奔涌——「萧萧下」对「滚滚来」，叠字相对，气势磅礴。这首诗被誉为「古今七律第一」！",
 src:"杜甫《登高》"},

{before:"不尽长江滚滚",blank:"来",after:"",line2:"",
 opts:["来","奔","涌","流"],
 full:"无边落木萧萧下，\n不尽长江滚滚来。",
 exp:"下与来（动词方向相对），萧萧（落叶声）与滚滚（江水势），叠字巧妙相对。一个向下（叶落），一个向前（江来），时间流逝与历史长河的双重意象叠加。",
 src:"杜甫《登高》"},

{before:"接天莲叶无穷",blank:"碧",after:"",line2:"映日荷花别样红",

 src:"杨万里《晓出净慈寺送林子方》"},

{before:"映日荷花别样",blank:"红",after:"",line2:"",
 opts:["红","艳","美","香"],
 full:"接天莲叶无穷碧，\n映日荷花别样红。",
 exp:"「别样红」——特别地红，与众不同地红！碧（冷绿）对红（暖红），构成视觉上最强烈的色彩对比，是《笠翁对韵》颜色对仗的最高示范。",
 src:"杨万里《晓出净慈寺送林子方》"},

{before:"山重水复疑无路，柳暗花明",blank:"又一村",after:"",line2:"",

 full:"山重水复疑无路，\n柳暗花明又一村。",

 src:"陆游《游山西村》"},

{before:"采菊东篱下，悠然见",blank:"南山",after:"",line2:"",

/* ============================================================
   TTS
============================================================ */
var _ttsVoice=null, _ttsPending='';
function _initTTS(){
  if(!window.speechSynthesis) return;
  function pick(){
    var vs=window.speechSynthesis.getVoices();
    if(!vs.length) return;
    var order=['zh-TW','zh_TW','zh-CN','zh_CN','zh-HK','zh'];
    for(var k=0;k<order.length;k++){
      var f=vs.filter(function(v){return v.lang.indexOf(order[k])===0;});
      if(f.length){_ttsVoice=f[0];break;}
    }
    if(!_ttsVoice) _ttsVoice=vs.find(function(v){return /zh/i.test(v.lang);})||null;
  }
  pick();
  if(typeof window.speechSynthesis.onvoiceschanged!=='undefined')
    window.speechSynthesis.onvoiceschanged=pick;
}
function _speakNow(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var clean=text.replace(/\n/g,'，');
  var utt=new SpeechSynthesisUtterance(clean);
  utt.lang='zh-CN'; utt.rate=0.80; utt.pitch=1.45;
  if(_ttsVoice) utt.voice=_ttsVoice;
  var btn=document.getElementById('speak-btn');
  function done(){if(btn)btn.classList.remove('speaking');}
  utt.onend=done; utt.onerror=done;
  if(btn) btn.classList.add('speaking');
  window.speechSynthesis.speak(utt);
}
function speakCouplet(text){
  _ttsPending=text;
  if(_ttsVoice||!window.speechSynthesis){_speakNow(text);return;}
  var tries=0,timer=setInterval(function(){
    tries++;
    if(window.speechSynthesis.getVoices().length||tries>8){
      clearInterval(timer);_initTTS();_speakNow(_ttsPending);
    }
  },100);
}
function replaySpeak(){if(_ttsPending)_speakNow(_ttsPending);}

/* ============================================================
   UTILS
============================================================ */
function el(id){return document.getElementById(id);}
function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  el(id).classList.add('active'); window.scrollTo(0,0);
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}
function escH(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function starsFor(score,max){
  var p=score/max;
  if(p>=0.9) return 3;
  if(p>=0.7) return 2;
  if(p>=0.45) return 1;
  return 0;
}
function starStr(n){ return '⭐'.repeat(n)+('☆'.repeat(3-n)); }

============================================================ */
function rank(pct){
  if(pct>=0.95) return {t:'状元',d:'才绝天下，对联宗师！',icon:'🏆'};
  if(pct>=0.85) return {t:'榜眼',d:'学富五车，差一步登顶！',icon:'🥈'};
  if(pct>=0.72) return {t:'探花',d:'满腹经纶，实属佳才！',icon:'🥉'};
  if(pct>=0.58) return {t:'进士',d:'根基扎实，前途无量！',icon:'📜'};
  if(pct>=0.42) return {t:'举人',d:'初显才华，继续努力！',icon:'📚'};
  if(pct>=0.25) return {t:'秀才',d:'略有根基，多读经典！',icon:'✏️'};
  return              {t:'童生',d:'万里路从脚下起，加油！',icon:'🌱'};
}

function startLevel(lvIdx){
  var lv=LEVELS[lvIdx];
  G.lvIdx=lvIdx; G.cur=0; G.score=0; G.streak=0; G.maxStreak=0;
  G.answered=false; G.history=[];
  G.questions=shuffle(DB.slice(lv.range[0], lv.range[1]));
  loadQ();
  show('game-screen');
}


/* derive partner line from full couplet when line2 is empty */
function getHint(q){
  // If the question line already embeds both parts (long after), no extra hint needed
  if(Array.from(q.after).length >= 4) return null;
  if(q.line2) return {text:q.line2, tag:'', auto:false};
  var lines = q.full.split('\n')
    .map(function(l){return l.trim().replace(/[，。！？；：、]$/,'');})
    .filter(Boolean);
  if(lines.length < 2) return null;
  for(var i=0;i<lines.length;i++){
    if(lines[i].indexOf(q.blank)===-1){
      var fullFirst = q.full.split('\n')[0].replace(/[，。！？；：]/g,'').trim();
      var isUpper = (fullFirst.indexOf(q.blank)===-1);
      return {text:lines[i], tag: isUpper ? '上联' : '下联', auto:true};
    }
  }
  return null;
}

function loadQ(){
  G.answered=false;
  var q=G.questions[G.cur];
  var n=G.cur+1, tot=G.questions.length;
  var lv=LEVELS[G.lvIdx];

  el('prog-txt').textContent='第 '+n+' 题';
  el('prog-pct').textContent=(n-1)+' / '+tot;
  el('prog-fill').style.width=((G.cur/tot)*100)+'%';
  el('score-badge').textContent=G.score+'分';
  el('streak-n').textContent=G.streak;
  el('src-tag').textContent=q.src;

  var nQ=Array.from(q.blank).length;
  var ph=Array.from({length:nQ},function(){return '？';}).join('');
  el('q-line1').innerHTML=escH(q.before)+'<span class="blank" id="blank-el">'+ph+'</span>'+escH(q.after);
  // Show partner line as hint
  var hint = getHint(q);
  if(hint && hint.auto){
    el('hint-row').style.display='block';
    el('hint-tag').textContent=hint.tag;
    el('hint-txt').textContent=hint.text;
    el('q-line2').textContent='';
  } else if(hint && !hint.auto){
    el('hint-row').style.display='none';
    el('q-line2').textContent=hint.text;
  } else {
    el('hint-row').style.display='none';
    el('q-line2').textContent='';
  }

  var shuffled=shuffle(q.opts.slice());
  for(var i=0;i<4;i++){
    var btn=el('opt'+i);
    btn.textContent=shuffled[i];
    btn.className='opt';
    btn.disabled=false;
    btn.dataset.val=shuffled[i];
  }
  var fb=el('feedback');
  fb.className='feedback'; fb.style.display='none';

  var isLast=(G.cur+1)>=G.questions.length;
  el('next-btn').textContent=isLast?'查看本关成绩 →':'继续下一题 →';

  setTimeout(function(){
    var firstBtn=document.querySelector('.opt:not([disabled])');
    if(firstBtn) firstBtn.focus();
  },160);
}

function pickOpt(btn){
  if(G.answered) return;
  G.answered=true;
  var q=G.questions[G.cur];
  var pick=btn.dataset.val;
  var ok=(pick===q.blank);

  if(ok){
    G.streak++; if(G.streak>G.maxStreak) G.maxStreak=G.streak;
    G.score+=(G.streak>=3?7:5);
  } else { G.streak=0; }

  btn.classList.add(ok?'correct':'wrong');
  if(!ok){
    document.querySelectorAll('.opt').forEach(function(b){
      if(b.dataset.val===q.blank) b.classList.add('reveal');
    });
  }
  document.querySelectorAll('.opt').forEach(function(b){b.disabled=true;});

  var badge=el('streak-badge');
  badge.classList.remove('pulse'); void badge.offsetWidth;
  if(ok&&G.streak>0) badge.classList.add('pulse');
  el('streak-n').textContent=G.streak;
  el('score-badge').textContent=G.score+'分';

  var blankEl=document.getElementById('blank-el');
  if(blankEl){
    blankEl.textContent=q.blank;
    blankEl.style.color=ok?'var(--green)':'var(--red)';
    blankEl.style.borderBottomColor=ok?'var(--green)':'var(--red)';
  }

  var fb=el('feedback');
  fb.style.display='block';
  fb.className='feedback show '+(ok?'ok':'err');

  var head=el('fb-head');
  head.className='fb-head '+(ok?'ok':'err');
  if(ok){
    var msgs=['答对了！','完全正确！','真棒！','厉害！','妙极！'];
    if(G.streak>=3) msgs=['🔥 连击×'+G.streak+'！','一气呵成！','势如破竹！'];
    head.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  } else {
    head.textContent='答错了，正确答案是「'+q.blank+'」';
  }

  var spBtn=el('speak-btn');
  if(spBtn) spBtn.className='speak-btn'+(ok?'':' err-s');

  var fullHtml=escH(q.full).replace(escH(q.blank),'<span class="hl">'+escH(q.blank)+'</span>');
  el('full-couplet').innerHTML=fullHtml.replace(/\n/g,'<br>');
  el('fb-exp').textContent=q.exp;

  G.history.push({q:q.before+'___'+q.after, ans:pick, blank:q.blank, ok:ok});
  setTimeout(function(){speakCouplet(q.full);},420);
}

function doNext(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  _ttsPending='';
  G.cur++;
  if(G.cur>=G.questions.length){ showLevelEnd(); }
  else { loadQ(); }
}

/* ============================================================
   LEVEL END
============================================================ */
function showLevelEnd(){
  var lv=LEVELS[G.lvIdx];
  var maxBase=G.questions.length*5;
  var stars=starsFor(G.score, maxBase+G.maxStreak*2+10);
  var r=rank(G.score/Math.max(1,maxBase));

  // Save progress
  if(stars>(PROG.stars[G.lvIdx+1]||0)) PROG.stars[G.lvIdx+1]=stars;
  if(G.score>(PROG.scores[G.lvIdx+1]||0)) PROG.scores[G.lvIdx+1]=G.score;
  var nextLvId=G.lvIdx+2;
  if(stars>=1 && nextLvId>PROG.unlocked) PROG.unlocked=nextLvId;
  saveProgress(PROG);

  el('le-icon').textContent=r.icon;
  el('le-stars').textContent=starStr(stars);
  el('le-score').textContent=G.score;
  el('le-max').textContent=maxBase+'+';
  el('le-title').textContent=r.t;
  el('le-desc').textContent=r.d;

  // Show unlock message
  var ulBox=el('le-unlock');
  if(stars>=1 && G.lvIdx+1<LEVELS.length){
    var nextLv=LEVELS[G.lvIdx+1];
    ulBox.style.display='block';
    el('le-unlock-txt').textContent='「'+nextLv.name+'」已解锁！'+nextLv.desc;
  } else { ulBox.style.display='none'; }

  // History
  var html=G.history.map(function(h){
    return '<div class="hist-row">'+
      '<span style="font-size:14px;flex-shrink:0">'+(h.ok?'✅':'❌')+'</span>'+
      '<span class="hist-q">'+escH(h.q)+'</span>'+
      '<span class="hist-a" style="color:'+(h.ok?'var(--green)':'var(--red)')+'">'+escH(h.ok?h.blank:h.ans)+'</span>'+
      '</div>';
  }).join('');
  el('le-hist').innerHTML=html;

  // Buttons
  var hasNext=G.lvIdx+1<LEVELS.length && nextLvId<=PROG.unlocked;
  el('le-next-btn').style.display=hasNext?'block':'none';

  el('prog-fill').style.width='100%';
  el('prog-pct').textContent=G.questions.length+' / '+G.questions.length;

  show('lvend-screen');
}

  renderMap();

  el('back-btn').addEventListener('click',function(){
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    _ttsPending='';
    renderMap();
    show('map-screen');
  });
  el('next-btn').addEventListener('click',doNext);
  el('le-next-btn').addEventListener('click',function(){
    startLevel(G.lvIdx+1);
  });
  el('le-retry-btn').addEventListener('click',function(){
    startLevel(G.lvIdx);
  });
  el('le-map-btn').addEventListener('click',function(){
    renderMap(); show('map-screen');
  });

  for(var i=0;i<4;i++){
    (function(idx){
      el('opt'+idx).addEventListener('click',function(){pickOpt(this);});
    })(i);
  }

  document.addEventListener('keydown',function(e){
    if(!el('game-screen').classList.contains('active')) return;
    var map={'1':0,'2':1,'3':2,'4':3,'a':0,'b':1,'c':2,'d':3};
    var k=e.key.toLowerCase();
    if(k in map && !G.answered){ pickOpt(el('opt'+map[k])); }
    else if((k==='enter'||k===' ')&&G.answered){ doNext(); }
  });
});
</script>
</body>
</html>
